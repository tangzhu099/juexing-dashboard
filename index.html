<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>觉醒团队 · 运营仪表盘</title>
<style>
  :root {
    --bg: #0b1120; --card: #111827; --border: #1e293b;
    --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b;
    --danger: #ef4444; --warn: #f59e0b; --ok: #22c55e; --info: #3b82f6; --accent: #8b5cf6;
    --danger-bg: #3b1010; --warn-bg: #3d2800; --ok-bg: #0a3018; --info-bg: #0c1f3d; --accent-bg: #1e1040;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); padding: 32px 48px; max-width: 1600px; margin: 0 auto;
  }

  /* ── Header ── */
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .header h1 { font-size: 26px; font-weight: 800; }
  .header h1 span { background: linear-gradient(135deg, var(--accent), var(--ok), var(--warn)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .meta { text-align: right; }
  .header .meta .date { font-size: 13px; color: var(--muted); }
  .header .meta .badge { display: inline-block; margin-top: 4px; padding: 2px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; background: var(--info-bg); color: #93c5fd; }

  /* ── KPI Bar ── */
  .kpi-bar {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px;
    margin-bottom: 20px;
  }
  .kpi {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; text-align: center;
  }
  .kpi .kpi-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .kpi .kpi-value { font-size: 26px; font-weight: 800; }
  .kpi .kpi-sub { font-size: 11px; margin-top: 2px; }
  .kpi .kpi-change { font-size: 10px; margin-top: 4px; font-weight: 600; }
  .kpi.danger { border-color: var(--danger); background: var(--danger-bg); }
  .kpi.warn { border-color: var(--warn); background: var(--warn-bg); }
  .kpi.ok { border-color: var(--ok); background: var(--ok-bg); }
  .kpi.info { border-color: var(--info); background: var(--info-bg); }
  .kpi.accent { border-color: var(--accent); background: var(--accent-bg); }

  /* ── Alert ── */
  .alert {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 18px; border-radius: 10px; margin-bottom: 20px;
    font-size: 13px; line-height: 1.6;
  }
  .alert.info { background: var(--info-bg); border: 1px solid var(--info); }
  .alert.warn { background: var(--warn-bg); border: 1px solid var(--warn); }
  .alert .alert-icon { font-size: 20px; flex-shrink: 0; }
  .alert strong { color: var(--warn); }

  /* ── Grid ── */
  .row { display: grid; gap: 16px; margin-bottom: 16px; }
  .row.col2 { grid-template-columns: 1fr 1fr; }
  .row.col3 { grid-template-columns: 1fr 1fr 1fr; }
  .row.col7 { grid-template-columns: repeat(7, 1fr); }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px;
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .card-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }

  /* ── Flywheel ── */
  .flywheel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px 12px; padding: 8px 0; }
  .fw-node { text-align: center; }
  .fw-node .icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; font-size: 18px; }
  .fw-node .name { font-size: 11px; font-weight: 700; margin-bottom: 2px; }
  .fw-node .data { font-size: 10px; color: var(--dim); }
  .fw-node .sub { font-size: 9px; margin-top: 2px; line-height: 1.3; white-space: pre-line; }
  .fw-arrow { display: flex; align-items: center; justify-content: center; color: #334155; font-size: 14px; font-weight: bold; }
  .fw-arrow-down { display: flex; align-items: center; justify-content: center; color: #475569; font-size: 18px; font-weight: bold; grid-column: 2; }
  .fw-node.danger .icon { background: var(--danger-bg); color: #fca5a5; }
  .fw-node.warn .icon { background: var(--warn-bg); color: #fcd34d; }
  .fw-node.ok .icon { background: var(--ok-bg); color: #86efac; }
  .fw-node.info .icon { background: var(--info-bg); color: #93c5fd; }

  /* ── Metric Table ── */
  .mt-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .mt-row:last-child { border-bottom: none; }
  .mt-name { font-size: 12px; flex: 1; }
  .mt-val { font-size: 12px; font-weight: 600; text-align: right; }
  .mt-change { font-size: 10px; color: var(--dim); margin-left: 8px; min-width: 40px; text-align: right; }

  /* ── Tags ── */
  .tag { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 9px; font-weight: 700; }
  .tag.danger { background: var(--danger-bg); color: #fca5a5; }
  .tag.warn { background: var(--warn-bg); color: #fcd34d; }
  .tag.ok { background: var(--ok-bg); color: #86efac; }
  .tag.info { background: var(--info-bg); color: #93c5fd; }
  .tag.accent { background: var(--accent-bg); color: #c4b5fd; }

  /* ── Timeline Cards ── */
  .tl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tl-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; display: flex; flex-direction: column; gap: 6px;
  }
  .tl-card.priority { border-color: var(--danger); border-width: 2px; background: var(--danger-bg); }
  .tl-card.done { opacity: 0.5; }
  .tl-card .tl-top { display: flex; justify-content: space-between; align-items: center; }
  .tl-card .tl-name { font-size: 14px; font-weight: 700; }
  .tl-card .tl-date { font-size: 11px; color: var(--dim); }
  .tl-card .tl-body { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .tl-card .tl-bottom { display: flex; justify-content: space-between; align-items: center; }
  .tl-card .tl-owner { font-size: 11px; color: var(--dim); }
  .tl-card .tl-tag { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 700; }
  .tl-card .tl-tag.danger { background: var(--danger-bg); color: #fca5a5; }
  .tl-card .tl-tag.warn { background: var(--warn-bg); color: #fcd34d; }
  .tl-card .tl-tag.info { background: var(--info-bg); color: #93c5fd; }
  .tl-card .tl-tag.ok { background: var(--ok-bg); color: #86efac; }

  .tl-section-title { font-size: 12px; color: var(--dim); font-weight: 700; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }

  /* ── Team ── */
  .team-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .team-row:last-child { border-bottom: none; }
  .team-name { width: 70px; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .team-roles { flex: 1; display: flex; gap: 3px; flex-wrap: wrap; }
  .team-role { font-size: 8px; padding: 1px 6px; border-radius: 6px; background: var(--border); color: var(--dim); }
  .team-load { width: 80px; text-align: right; font-size: 11px; font-weight: 700; flex-shrink: 0; }

  /* ── Actions ── */
  .act-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .act-item:last-child { border-bottom: none; }
  .act-prio { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; flex-shrink: 0; }
  .act-prio.p0 { background: var(--danger); color: #fff; }
  .act-prio.p1 { background: var(--warn); color: #000; }
  .act-prio.p2 { background: var(--info); color: #fff; }
  .act-text { font-size: 11px; flex: 1; }
  .act-owner { font-size: 9px; color: var(--dim); white-space: nowrap; }

  /* ── Footer ── */
  .footer { text-align: center; color: #334155; font-size: 10px; margin-top: 20px; }

  .full { grid-column: 1 / -1; }
  .section-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0 16px; }

  /* ── Product Section ── */
  .prod-section { margin-bottom: 14px; }
  .prod-section:last-child { margin-bottom: 0; }
  .prod-header { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }

  @media (max-width: 1200px) {
    body { padding: 16px; }
    .kpi-bar { grid-template-columns: repeat(3, 1fr); }
    .row.col2, .row.col3 { grid-template-columns: 1fr; }
    .row.col7 { grid-template-columns: repeat(4, 1fr); }
    .flywheel { flex-wrap: wrap; }
    .fw-arrow { display: none; }
  }
  @media (max-width: 768px) {
    .kpi-bar { grid-template-columns: repeat(2, 1fr); }
    .row.col7 { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div><h1><span>⚡</span> 觉醒团队 · 运营仪表盘</h1></div>
  <div class="meta">
    <div class="date" id="meta-date">--</div>
    <div class="badge" id="meta-badge">数据驱动 · 持续迭代</div>
  </div>
</div>

<!-- KPI Bar -->
<div class="kpi-bar" id="kpi-bar"></div>

<!-- Alert -->
<div class="alert info" id="alert-box">
  <div class="alert-icon">📊</div>
  <div id="alert-text"></div>
</div>

<!-- Flywheel -->
<div class="card full">
  <div class="card-title">🔄 经营飞轮</div>
  <div class="flywheel" id="flywheel"></div>
</div>

<!-- Timeline + Products -->
<div class="row col2">
  <div class="card">
    <div class="card-header">
      <span class="card-title">📅 活动看板</span>
      <span class="tag info">按状态排序</span>
    </div>
    <div id="timeline-active"></div>
    <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">
      <div style="font-size:10px;color:var(--dim);margin-bottom:6px">✅ 已完成</div>
      <div id="timeline-done" style="opacity:0.55"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <span class="card-title">📦 产品看板</span>
    </div>
    <div id="products"></div>
  </div>
</div>

<!-- Team + Actions -->
<div class="row col2">
  <div class="card">
    <div class="card-title">👥 团队精力</div>
    <div id="team"></div>
  </div>
  <div class="card">
    <div class="card-header">
      <span class="card-title">⚡ 行动清单</span>
    </div>
    <div id="actions"></div>
    <div style="margin-top:12px;padding-top:8px;border-top:1px solid var(--border)">
      <div style="font-size:10px;color:var(--dim);margin-bottom:6px">📌 待沉淀</div>
      <div id="knowledge"></div>
    </div>
  </div>
</div>

<div class="footer" id="footer"></div>

<script>
const COLORS = { danger: '#ef4444', warn: '#f59e0b', ok: '#22c55e', info: '#3b82f6', accent: '#8b5cf6' };

function tag(t, c) { return `<span class="tag ${c}">${t}</span>`; }

// ── 从 data.json 加载数据 ──
// 启动服务器：python3 scripts/serve_dashboard.py → http://localhost:8888
fetch('data.json').then(r => r.json()).then(d => {

  // Meta
  document.getElementById('meta-date').textContent = `更新：${d.updated}` + (d.week ? ` | ${d.week}` : '');
  document.getElementById('alert-text').innerHTML = `<strong>核心诊断：</strong>${d.summary}`;
  document.getElementById('footer').textContent = `觉醒团队 · 运营仪表盘 ｜ 更新于 ${d.updated} ｜ 改 data.json 刷新即可`;

  // KPI Bar
  const kpi = document.getElementById('kpi-bar');
  d.kpi.forEach(k => {
    const div = document.createElement('div'); div.className = `kpi ${k.color}`;
    div.innerHTML = `<div class="kpi-label">${k.label}</div><div class="kpi-value">${k.value}</div><div class="kpi-sub">${k.sub}</div><div class="kpi-change" style="color:${COLORS[k.color]||'#94a3b8'}">${k.change||''}</div>`;
    kpi.appendChild(div);
  });

  // Flywheel — 两行布局：上3个(带→箭头) + 下行箭头 + 下2个(带→箭头)
  const fw = document.getElementById('flywheel');
  fw.style.gridTemplateColumns = '1fr auto 1fr auto 1fr';
  const N = d.flywheel.length;
  
  // 第一行: 前3个节点 + 箭头
  for (let i = 0; i < Math.min(3, N); i++) {
    const n = d.flywheel[i];
    const div = document.createElement('div'); div.className = `fw-node ${n.status}`;
    div.innerHTML = `<div class="icon">${n.icon}</div><div class="name">${n.name}</div><div class="data">${n.data}</div><div class="sub" style="color:${COLORS[n.status]}">${n.label}<br>${(n.detail||'').replace(/\n/g,'<br>')}</div>`;
    fw.appendChild(div);
    if (i < 2) { const a = document.createElement('div'); a.className = 'fw-arrow'; a.textContent = '→'; fw.appendChild(a); }
  }

  // 第二行: 转折箭头 + 空位 + 第4节点 + 箭头 + 第5节点
  const downArrow = document.createElement('div'); downArrow.className = 'fw-arrow-down'; downArrow.textContent = '↓';
  fw.appendChild(downArrow);
  
  const spacer = document.createElement('div'); fw.appendChild(spacer);
  
  for (let i = 3; i < N; i++) {
    const n = d.flywheel[i];
    const div = document.createElement('div'); div.className = `fw-node ${n.status}`;
    div.innerHTML = `<div class="icon">${n.icon}</div><div class="name">${n.name}</div><div class="data">${n.data}</div><div class="sub" style="color:${COLORS[n.status]}">${n.label}<br>${(n.detail||'').replace(/\n/g,'<br>')}</div>`;
    fw.appendChild(div);
    if (i < N - 1) { const a = document.createElement('div'); a.className = 'fw-arrow'; a.textContent = '→'; fw.appendChild(a); }
  }

  // Timeline: cards grid — active first, then done
  const ta = document.getElementById('timeline-active');
  const td = document.getElementById('timeline-done');
  const activeItems = d.timeline.filter(t => t.status !== 'done');
  const doneItems = d.timeline.filter(t => t.status === 'done');

  function renderCards(items, container) {
    items.forEach(t => {
      const isPriority = t.status === 'priority';
      const tagColor = isPriority ? 'danger' : t.status === 'warn' ? 'warn' : t.status === 'ok' ? 'ok' : 'info';
      const div = document.createElement('div');
      div.className = `tl-card${isPriority ? ' priority' : ''}`;
      div.innerHTML = `
        <div class="tl-top">
          <span class="tl-name">${t.name}</span>
          <span class="tl-tag ${tagColor}">${t.tag}</span>
        </div>
        <div class="tl-body">${t.desc || t.owner}</div>
        <div class="tl-bottom">
          <span class="tl-date">${t.date}</span>
          <span class="tl-owner">${t.owner}</span>
        </div>`;
      container.appendChild(div);
    });
  }

  renderCards(activeItems, ta);
  if (doneItems.length > 0) {
    renderCards(doneItems, td);
  } else {
    td.innerHTML = '<div style="font-size:11px;color:var(--dim);padding:8px 0">暂无已完成活动</div>';
  }

  // Products
  const prods = document.getElementById('products');
  d.products.forEach(p => {
    const sec = document.createElement('div');
    sec.className = 'prod-section';
    sec.innerHTML = `<div class="prod-header">${p.icon} ${p.name}</div>`;
    p.metrics.forEach(m => {
      const row = document.createElement('div'); row.className = 'mt-row';
      row.innerHTML = `<span class="mt-name">${m.name}</span><span class="mt-val" style="color:${COLORS[m.status]||'var(--text)'}">${m.value}</span>${m.change ? `<span class="mt-change" style="color:${m.change>0?'var(--ok)':m.change<0?'var(--danger)':'var(--dim)'}">${m.change>0?'↑':'↓'}${Math.abs(m.change)}</span>` : '<span class="mt-change"></span>'}`;
      sec.appendChild(row);
    });
    if (p.note) { const n = document.createElement('div'); n.style.cssText = 'font-size:10px;color:var(--dim);margin-top:4px'; n.textContent = p.note; sec.appendChild(n); }
    prods.appendChild(sec);
  });

  // Team
  const team = document.getElementById('team');
  d.team.forEach(p => {
    const row = document.createElement('div'); row.className = 'team-row';
    row.innerHTML = `<span class="team-name">${p.name}</span><span class="team-roles">${p.roles.map(r => `<span class="team-role">${r}</span>`).join('')}</span><span class="team-load" style="color:${COLORS[p.loadColor]}">${p.load}</span>`;
    team.appendChild(row);
  });

  // Actions
  const actions = document.getElementById('actions');
  d.actions.forEach(a => {
    const row = document.createElement('div'); row.className = 'act-item';
    row.innerHTML = `<div class="act-prio ${a.priority}">${a.priority.toUpperCase()}</div><div class="act-text">${a.text}</div><div class="act-owner">${a.owner}</div>`;
    actions.appendChild(row);
  });

  // Knowledge
  const kn = document.getElementById('knowledge');
  d.knowledge.forEach(a => {
    const row = document.createElement('div'); row.className = 'act-item';
    row.innerHTML = `<div class="act-prio ${a.priority}">${a.priority.toUpperCase()}</div><div class="act-text">${a.text}</div><div class="act-owner">${a.owner}</div>`;
    kn.appendChild(row);
  });

}).catch(() => { document.getElementById('alert-text').textContent = '❌ 数据加载失败，请通过 HTTP 服务器打开（python3 scripts/serve_dashboard.py）'; });
</script>
</body>
</html>
