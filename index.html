<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>觉醒团队 · 运营仪表盘</title>
<style>
  :root {
    --bg: #0b1120; --card: #111827; --border: #1e293b;
    --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b;
    --danger: #ef4444; --warn: #f59e0b; --ok: #22c55e; --info: #3b82f6; --accent: #8b5cf6;
    --danger-bg: #3b1010; --warn-bg: #3d2800; --ok-bg: #0a3018; --info-bg: #0c1f3d; --accent-bg: #1e1040;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); padding: 32px 48px; max-width: 1600px; margin: 0 auto;
  }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .header h1 { font-size: 26px; font-weight: 800; }
  .header h1 span { background: linear-gradient(135deg, var(--accent), var(--ok), var(--warn)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .meta { text-align: right; }
  .header .meta .date { font-size: 13px; color: var(--muted); }
  .header .meta .badge { display: inline-block; margin-top: 4px; padding: 2px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; background: var(--info-bg); color: #93c5fd; }
  .kpi-bar { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 20px; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
  .kpi .kpi-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .kpi .kpi-value { font-size: 26px; font-weight: 800; }
  .kpi .kpi-sub { font-size: 11px; margin-top: 2px; }
  .kpi .kpi-change { font-size: 10px; margin-top: 4px; font-weight: 600; }
  .kpi.danger { border-color: var(--danger); background: var(--danger-bg); }
  .kpi.warn { border-color: var(--warn); background: var(--warn-bg); }
  .kpi.ok { border-color: var(--ok); background: var(--ok-bg); }
  .kpi.info { border-color: var(--info); background: var(--info-bg); }
  .kpi.accent { border-color: var(--accent); background: var(--accent-bg); }
  .alert { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; line-height: 1.6; }
  .alert.info { background: var(--info-bg); border: 1px solid var(--info); }
  .alert .alert-icon { font-size: 20px; flex-shrink: 0; }
  .alert strong { color: var(--warn); }
  .row { display: grid; gap: 16px; margin-bottom: 16px; }
  .row.col2 { grid-template-columns: 1fr 1fr; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .card-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
  .flywheel { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; gap: 8px 12px; padding: 8px 0; }
  .fw-node { text-align: center; }
  .fw-node .icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; font-size: 18px; }
  .fw-node .name { font-size: 11px; font-weight: 700; margin-bottom: 2px; }
  .fw-node .data { font-size: 10px; color: var(--dim); }
  .fw-node .sub { font-size: 9px; margin-top: 2px; line-height: 1.3; white-space: pre-line; }
  .fw-arrow { display: flex; align-items: center; justify-content: center; color: #334155; font-size: 14px; font-weight: bold; }
  .fw-arrow-down { display: flex; align-items: center; justify-content: center; color: #475569; font-size: 18px; font-weight: bold; }
  .fw-node.danger .icon { background: var(--danger-bg); color: #fca5a5; }
  .fw-node.warn .icon { background: var(--warn-bg); color: #fcd34d; }
  .fw-node.ok .icon { background: var(--ok-bg); color: #86efac; }
  .fw-node.info .icon { background: var(--info-bg); color: #93c5fd; }
  .mt-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .mt-row:last-child { border-bottom: none; }
  .mt-name { font-size: 12px; flex: 1; }
  .mt-val { font-size: 12px; font-weight: 600; text-align: right; }
  .mt-change { font-size: 10px; color: var(--dim); margin-left: 8px; min-width: 40px; text-align: right; }
  .tag { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 9px; font-weight: 700; }
  .tag.danger { background: var(--danger-bg); color: #fca5a5; }
  .tag.warn { background: var(--warn-bg); color: #fcd34d; }
  .tag.ok { background: var(--ok-bg); color: #86efac; }
  .tag.info { background: var(--info-bg); color: #93c5fd; }
  .tag.accent { background: var(--accent-bg); color: #c4b5fd; }
  .tl-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .tl-card.priority { border-color: var(--danger); border-width: 2px; background: var(--danger-bg); }
  .tl-card.done { opacity: 0.5; }
  .tl-card .tl-top { display: flex; justify-content: space-between; align-items: center; }
  .tl-card .tl-name { font-size: 14px; font-weight: 700; }
  .tl-card .tl-date { font-size: 11px; color: var(--dim); }
  .tl-card .tl-body { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .tl-card .tl-bottom { display: flex; justify-content: space-between; align-items: center; }
  .tl-card .tl-owner { font-size: 11px; color: var(--dim); }
  .tl-card .tl-tag { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 700; }
  .tl-card .tl-tag.danger { background: var(--danger-bg); color: #fca5a5; }
  .tl-card .tl-tag.warn { background: var(--warn-bg); color: #fcd34d; }
  .tl-card .tl-tag.info { background: var(--info-bg); color: #93c5fd; }
  .tl-card .tl-tag.ok { background: var(--ok-bg); color: #86efac; }
  .team-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .team-row:last-child { border-bottom: none; }
  .team-name { width: 70px; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .team-roles { flex: 1; display: flex; gap: 3px; flex-wrap: wrap; }
  .team-role { font-size: 8px; padding: 1px 6px; border-radius: 6px; background: var(--border); color: var(--dim); }
  .team-load { width: 80px; text-align: right; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .act-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .act-item:last-child { border-bottom: none; }
  .act-prio { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; flex-shrink: 0; }
  .act-prio.p0 { background: var(--danger); color: #fff; }
  .act-prio.p1 { background: var(--warn); color: #000; }
  .act-prio.p2 { background: var(--info); color: #fff; }
  .act-text { font-size: 11px; flex: 1; }
  .act-owner { font-size: 9px; color: var(--dim); white-space: nowrap; }
  .footer { text-align: center; color: #334155; font-size: 10px; margin-top: 20px; }
  .full { grid-column: 1 / -1; }
  .prod-section { margin-bottom: 14px; }
  .prod-section:last-child { margin-bottom: 0; }
  .prod-header { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
  @media (max-width: 1200px) {
    body { padding: 16px; }
    .kpi-bar { grid-template-columns: repeat(3, 1fr); }
    .row.col2 { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    .kpi-bar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="header">
  <div><h1><span>⚡</span> 觉醒团队 · 运营仪表盘</h1></div>
  <div class="meta">
    <div class="date" id="meta-date">--</div>
    <div class="badge">数据驱动 · 持续迭代</div>
  </div>
</div>
<div class="kpi-bar" id="kpi-bar"></div>
<div class="alert info">
  <div class="alert-icon">📊</div>
  <div id="alert-text"></div>
</div>
<div class="card full">
  <div class="card-title">🔄 经营飞轮</div>
  <div class="flywheel" id="flywheel"></div>
</div>
<div class="row col2">
  <div class="card">
    <div class="card-header">
      <span class="card-title">📅 活动看板</span>
      <span class="tag info">按状态排序</span>
    </div>
    <div id="timeline-active"></div>
    <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">
      <div style="font-size:10px;color:var(--dim);margin-bottom:6px">✅ 已完成</div>
      <div id="timeline-done" style="opacity:0.55"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">📦 产品看板</span></div>
    <div id="products"></div>
  </div>
</div>
<div class="row col2">
  <div class="card">
    <div class="card-title">👥 团队精力</div>
    <div id="team"></div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">⚡ 行动清单</span></div>
    <div id="actions"></div>
    <div style="margin-top:12px;padding-top:8px;border-top:1px solid var(--border)">
      <div style="font-size:10px;color:var(--dim);margin-bottom:6px">📌 待沉淀</div>
      <div id="knowledge"></div>
    </div>
  </div>
</div>
<div class="footer" id="footer"></div>
